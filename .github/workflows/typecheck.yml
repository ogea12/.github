on: workflow_call
jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['latest']
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run typecheck
